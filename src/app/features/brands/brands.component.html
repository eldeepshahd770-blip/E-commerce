<section class="mt-20">
  <!-- Header -->
  <div class="bg-linear-to-r from-purple-600 to-indigo-500 text-(--card-bg) py-12 px-6">
    <!-- Breadcrumb -->
    <div class="container mx-auto mb-6 text-(--card-bg)/80 text-sm">
      <span routerLink="/" class="hover:underline cursor-pointer">Home</span>
      <span class="mx-2">/</span>
      <span class="text-(--card-bg) font-medium">Brands</span>
    </div>

    <!-- Title -->
    <div class="container mx-auto flex items-center gap-5">
      <!-- Icon -->
      <div
        class="w-16 h-16 bg-(--card-bg)/20 rounded-2xl flex items-center justify-center text-2xl"
      >
        <i class="fa-solid fa-tags"></i>
      </div>

      <!-- Text -->
      <div>
        <h1 class="text-4xl font-bold mb-2">Top Brands</h1>
        <p class="text-(--card-bg)/80 text-lg">Shop from your favorite brands</p>
      </div>
    </div>
  </div>

  <!-- Brands Grid -->

  <div class="container mx-auto px-6 py-10">
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
      <!-- Card -->
      @for (brand of brandslist(); track brand._id) {
        <div
          class="bg-(--card-bg) rounded-2xl border border-(--gray-color) p-6 text-center transition duration-300 cursor-pointer group hover:shadow-lg hover:border-purple-500"
        >
          <div
            class="bg-(--light-gray) rounded-xl p-6 flex items-center justify-center mb-4 transition group-hover:bg-(--gray-color)"
          >
            <img [src]="brand.image" class="h-10 object-contain" [alt]="brand.slug" />
          </div>

          <p
            class="font-medium text-(--color-secondary) mb-1 group-hover:text-purple-600 transition"
          >
            {{ brand.name }}
          </p>

          <span
            [routerLink]="['/detailsbrand', brand._id, brand.slug]"
            class="text-sm text-purple-500 opacity-0 translate-y-2 group-hover:opacity-100 group-hover:translate-y-0 transition duration-300 inline-block"
          >
            View Products <i class="fa-arrow-right"></i>
          </span>
        </div>
      }
    </div>
  </div>
</section>
