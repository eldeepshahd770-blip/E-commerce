<div class="bg-[#20c997] text-(--card-bg) py-12 mt-20 px-4 w-full">
  <div class="container mx-auto max-w-7xl">
    <nav class="flex items-center gap-2 text-sm text-(--card-bg)/80 mb-6 font-medium">
      <a routerLink="/" class="hover:text-(--card-bg) transition-colors">Home</a>
      <span>/</span>
      <span class="text-(--card-bg)">Categories</span>
    </nav>

    <div class="flex items-center gap-4">
      <div
        class="w-14 h-14 rounded-2xl bg-(--card-bg)/20 backdrop-blur-sm flex items-center justify-center text-(--card-bg) shrink-0 shadow-sm border border-(--card-bg) /10"
      >
        <i class="fa-solid fa-layer-group text-2xl"></i>
      </div>
      <div>
        <h1 class="text-3xl font-bold leading-tight">All Categories</h1>
        <p class="text-(--card-bg)/80 text-sm mt-1">Browse our wide range of product categories</p>
      </div>
    </div>
  </div>
</div>

<main class="container mx-auto px-4 py-12 max-w-7xl bg-(--bg-main) min-h-screen">
  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 md:gap-6">
    @for (category of categories(); track category._id) {
      <a
        [routerLink]="['/detailsCats', category._id, category.name]"
        class="group block bg-(--card-bg) rounded-2xl border border-(--light-gray) p-4 transition-all duration-300 hover:shadow-xl hover:-translate-y-1 hover:border-green-100 cursor-pointer text-center relative overflow-hidden"
      >
        <div
          class="w-full aspect-square bg-gray-50 rounded-xl mb-4 overflow-hidden flex items-center justify-center"
        >
          <img
            [src]="category.image"
            [alt]="category.name"
            class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
            loading="lazy"
          />
        </div>

        <h3
          class="font-bold text-(--color-secondary) text-sm md:text-base group-hover:text-[#20c997] transition-colors duration-300"
        >
          {{ category.name }}
        </h3>

        <div
          class="h-0 opacity-0 group-hover:h-5 group-hover:opacity-100 transition-all duration-300 overflow-hidden mt-1 flex items-center justify-center gap-1 text-[#20c997] text-xs font-medium"
        >
          View Subcategories
          <i class="fa-solid fa-arrow-right text-xs"></i>
        </div>
      </a>
    }
  </div>
</main>
