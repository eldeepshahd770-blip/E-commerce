<section class="container mx-auto px-6 py-10">
  <!-- Title -->
  <div class="flex justify-between items-center mb-8">
    <h2 class="text-3xl font-bold">
      <span class="text-(--color-secondary)">Shop By</span>
      <span class="text-(--color-primary)"> Category</span>
    </h2>

    <a
      routerLink="/categories"
      class="text-(--color-primary) font-medium flex items-center gap-2 hover:underline"
    >
      View All Categories
      <span><i class="fa-arrow-right text-(--color-primary)"></i></span>
    </a>
  </div>

  <!-- Grid -->
  <div class="grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6">
    <!-- Item -->
    @if (catsList()) {
      @for (categry of catsList(); track categry._id) {
        <div
          [routerLink]="['/detailsCats', categry._id, categry.name]"
          class="bg-(--card-bg) rounded-2xl border border-(--light-gray) shadow-sm hover:shadow-lg hover:-translate-y-1 transition duration-300 p-6 text-center cursor-pointer"
        >
          <img
            [src]="categry.image"
            class="w-20 h-20 mx-auto mb-4 rounded-full object-cover"
            [alt]="categry.slug"
          />
          <h3 class="text-(--color-secondary) font-medium">{{ categry.name }}</h3>
        </div>
      }
    }
  </div>
</section>
